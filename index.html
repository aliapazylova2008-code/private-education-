    let partnerFilter = false;
    let currentType = "all";

    function savePartners() {
        const partners = {};
        document.querySelectorAll('.partner-checkbox').forEach(cb => {
            partners[cb.dataset.name] = cb.checked;
        });
        localStorage.setItem('edu_partners', JSON.stringify(partners));
    }

    function loadPartners() {
        const saved = localStorage.getItem('edu_partners');
        if (saved) {
            const partners = JSON.parse(saved);
            document.querySelectorAll('.partner-checkbox').forEach(cb => {
                if (partners[cb.dataset.name]) cb.checked = true;
            });
        }
    }

    function renderStars(rating) {
        const full = Math.floor(rating);
        let stars = '';
        for (let i = 0; i < full; i++) stars += '★';
        for (let i = stars.length; i < 5; i++) stars += '☆';
        return stars;
    }

    function renderTable() {
        let filtered = institutions.filter(inst => {
            if (currentType !== "all" && inst.type !== currentType) return false;
            if (partnerFilter) {
                const saved = localStorage.getItem('edu_partners');
                if (saved) {
                    const partners = JSON.parse(saved);
                    if (!partners[inst.name]) return false;
                } else return false;
            }
            return true;
        });

        document.getElementById('stats-count').innerHTML = `🎓 Найдено: ${filtered.length} учреждений`;
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = filtered.map((inst, idx) => `
            <tr>
                <td>${idx+1}</td>
                <td style="text-align:center"><input type="checkbox" class="partner-checkbox" data-name="${inst.name}" ${localStorage.getItem('edu_partners') && JSON.parse(localStorage.getItem('edu_partners'))[inst.name] ? 'checked' : ''}></td>
                <td><strong>${inst.name}</strong>${inst.status === "⭐ Топ" ? '<span class="badge-top">⭐ Топ</span>' : '<span class="badge-private">🏢 Частная</span>'}</td>
                <td>${inst.type}</td>
                <td><span class="rating-stars">${renderStars(inst.rating)}</span> ${inst.rating}</td>
                <td>${inst.reviews}</td>
                <td>${inst.status}</td>
                <td>${inst.specialization}</td>
                <td class="address">${inst.address}</td>
                <td>${inst.phone}</td>
                <td><a href="${inst.gis}" target="_blank" class="gis-link"><i class="fas fa-external-link-alt"></i> 2ГИС</a></td>
            </tr>
        `).join('');

        document.querySelectorAll('.partner-checkbox').forEach(cb => {
            cb.addEventListener('change', () => { savePartners(); if(partnerFilter) renderTable(); });
        });
    }

    document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            currentType = chip.dataset.type;
            renderTable();
        });
    });

    document.getElementById('partner-filter-btn').addEventListener('click', () => {
        partnerFilter = !partnerFilter;
        document.getElementById('partner-filter-btn').classList.toggle('active', partnerFilter);
        renderTable();
    });

    renderTable();
    loadPartners();
</script>
